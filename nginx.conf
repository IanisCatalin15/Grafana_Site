# Aurora Incidents — static site on :3004 (TLS at edge: ia.aurora.direct)
server {
    listen 80;
    server_name ia.aurora.direct _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    location = / {
        add_header Cache-Control "no-store" always;
        try_files /index.html =404;
    }

    location = /login {
        add_header Cache-Control "no-store" always;
        try_files /index.html =404;
    }

    location ~* \.(?:html)$ {
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location ~* \.(?:js|css|svg|png|jpg|jpeg|gif|webp|ico)$ {
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    location /incidents-api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_pass http://gfn_api:4100/api/;
    }

    location /prom/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_pass http://prometheus:9090/api/v1/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
