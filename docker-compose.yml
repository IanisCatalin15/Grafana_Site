# Aurora Incidents UI — https://ia.aurora.direct → host :3004
services:
  site:
    image: nginx:1.27-alpine
    container_name: gfn_site
    restart: unless-stopped
    ports:
      - "3004:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/usr/share/nginx/html:ro
    networks:
      - gfn_network
      - grafana_monitoring

networks:
  gfn_network:
    external: true
  grafana_monitoring:
    external: true
